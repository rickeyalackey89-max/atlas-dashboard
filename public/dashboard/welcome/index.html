<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Welcome to Atlas Premium</title>
  <style>
    :root{--bg:#000;--gold:#f5a623;--cyan:#00d4ff;--green:#00e676;--t2:#888;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(0,212,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.018) 1px,transparent 1px);
      background-size:80px 80px;}
    .card{position:relative;z-index:1;max-width:480px;width:90%;padding:48px 40px;border:1px solid rgba(245,166,35,.25);text-align:center;}
    .icon{font-size:48px;margin-bottom:20px;}
    h1{font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:10px;}
    h1 span{color:var(--gold);}
    .sub{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:28px;}
    .email-badge{display:inline-block;padding:6px 16px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);font-size:13px;color:var(--gold);margin-bottom:28px;font-weight:700;}
    .btn{display:inline-block;padding:14px 32px;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:none;}
    .btn-gold{background:var(--gold);color:#000;}
    .status{font-size:12px;color:var(--t2);margin-top:16px;}
    .error-box{color:#f87171;font-size:14px;margin-bottom:20px;display:none;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .field{margin-bottom:16px;text-align:left;}
    label{display:block;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:8px;}
    input[type=password]{width:100%;background:#111;border:1px solid rgba(255,255,255,.07);color:#fff;font-size:14px;padding:12px 14px;outline:none;font-family:inherit;box-sizing:border-box;}
    input[type=password]:focus{border-color:var(--cyan);}
    .pw-hint{font-size:11px;color:var(--t2);margin-top:6px;}
    .pw-error{color:#f87171;font-size:12px;margin-top:10px;display:none;}
  </style>
  <link rel="stylesheet" href="/atlas_theme.css?v=20260514j"/>
</head>
<body>
<div class="card" id="card">
  <div class="icon">⏳</div>
  <h1>Verifying <span>Payment</span></h1>
  <p class="sub"><span class="spinner"></span>Checking your Stripe session...</p>
</div>

<script>
(function(){
  var params    = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var card      = document.getElementById('card');

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function showError(msg){
    card.innerHTML = '<div class="icon">❌</div><h1>Verification <span style="color:#f87171">Failed</span></h1><p class="sub">'+msg+'</p><a href="/" class="btn btn-gold" style="margin-top:24px;">Return Home</a>';
  }

  // ── Phase 2: password creation form ────────────────────────────────────────
  function showPasswordForm(email, token){
    card.innerHTML =
      '<div class="icon">🔐</div>'+
      '<h1>Create Your <span>Password</span></h1>'+
      (email ? '<div class="email-badge">'+esc(email)+'</div>' : '')+
      '<p class="sub" style="margin-bottom:20px;">Set a password to protect your account. You\'ll use this with your email every time you log in.</p>'+
      '<form id="pwForm" style="text-align:left">'+
        '<div class="field">'+
          '<label for="pw1">Choose Password</label>'+
          '<input type="password" id="pw1" placeholder="Min. 8 characters" autocomplete="new-password"/>'+
        '</div>'+
        '<div class="field">'+
          '<label for="pw2">Confirm Password</label>'+
          '<input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password"/>'+
        '</div>'+
        '<div class="pw-error" id="pwErr"></div>'+
        '<button type="submit" class="btn btn-gold" id="pwBtn" style="width:100%;margin-top:8px;">Set Password &amp; Enter Dashboard →</button>'+
      '</form>';

    document.getElementById('pwForm').addEventListener('submit', function(e){
      e.preventDefault();
      var pw1   = document.getElementById('pw1').value;
      var pw2   = document.getElementById('pw2').value;
      var pwErr = document.getElementById('pwErr');
      var pwBtn = document.getElementById('pwBtn');

      if (pw1.length < 8) {
        pwErr.textContent = 'Password must be at least 8 characters.';
        pwErr.style.display = 'block'; return;
      }
      if (pw1 !== pw2) {
        pwErr.textContent = 'Passwords do not match.';
        pwErr.style.display = 'block'; return;
      }

      pwErr.style.display = 'none';
      pwBtn.disabled = true;
      pwBtn.innerHTML = '<span class="spinner" style="border-top-color:#000;border-color:rgba(0,0,0,.2)"></span>Saving...';

      fetch('/api/set-password', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId, password: pw1 })
      })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.ok && data.token) {
          localStorage.setItem('atlas_premium_token', data.token);
          window.location.href = '/dashboard/';
        } else {
          pwErr.textContent = data.error || 'Failed to save password. Please try again.';
          pwErr.style.display = 'block';
          pwBtn.disabled = false;
          pwBtn.textContent = 'Set Password & Enter Dashboard →';
        }
      })
      .catch(function(){
        pwErr.textContent = 'Network error. Please try again.';
        pwErr.style.display = 'block';
        pwBtn.disabled = false;
        pwBtn.textContent = 'Set Password & Enter Dashboard →';
      });
    });
  }

  // ── Phase 1: verify Stripe session ─────────────────────────────────────────
  if (!sessionId) {
    showError('No session ID found. If you completed payment, <a href="https://discord.gg/uatU28mR" style="color:var(--gold)">contact us on Discord</a>.');
    return;
  }

  fetch('/api/verify', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ session_id: sessionId })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.ok && data.token) {
      // Store a temporary token so the session is not lost if user navigates away
      // before setting their password. It will be overwritten after set-password.
      localStorage.setItem('atlas_premium_token', data.token);
      showPasswordForm(data.email, data.token);
    } else {
      showError(data.error || 'Payment could not be verified. <a href="https://discord.gg/uatU28mR" style="color:var(--gold)">Contact us on Discord</a>.');
    }
  })
  .catch(function(){
    showError('Network error during verification. Please try again or <a href="https://discord.gg/uatU28mR" style="color:var(--gold)">contact us on Discord</a>.');
  });
})();
</script>

<!-- LOGOUT BUTTON -->
<button id="globalLogoutBtn" onclick="localStorage.removeItem('atlas_premium_token');window.location.href='/';" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;background:#111;color:#888;border:1px solid rgba(255,255,255,0.1);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;cursor:pointer;font-family:inherit;">Sign Out</button>
<script>(function(){try{var t=localStorage.getItem('atlas_premium_token');if(t){var d=JSON.parse(atob(t));if(d&&d.expires&&Date.now()<d.expires){document.getElementById('globalLogoutBtn').style.display='block';}}}catch(e){}})()</script>

  <script src="/atlas_motion.js?v=20260514c" defer></script>
</body>
</html>
