<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Atlas Premium</title>
  <style>
    :root{--bg:#000;--s1:#0a0a0a;--b:rgba(255,255,255,.07);--gold:#f5a623;--cyan:#00d4ff;--green:#00e676;--t2:#888;--text:#fff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);
      background-size:80px 80px;}
    .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:16px;}
    .logo{text-align:center;margin-bottom:32px;}
    .logo a{text-decoration:none;font-size:22px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--text);}
    .logo a span{color:var(--cyan);}
    .card{background:var(--s1);border:1px solid var(--b);padding:36px 32px;}
    h1{font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:6px;}
    .sub{font-size:12px;color:var(--t2);margin-bottom:28px;line-height:1.6;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:8px;}
    input{width:100%;background:#111;border:1px solid var(--b);color:var(--text);font-size:14px;padding:12px 14px;outline:none;font-family:inherit;}
    input:focus{border-color:var(--cyan);}
    .btn{display:block;width:100%;padding:14px;background:var(--gold);color:#000;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:pointer;margin-top:24px;font-family:inherit;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .error{color:#f87171;font-size:12px;margin-top:14px;display:none;line-height:1.5;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer-links{text-align:center;margin-top:20px;font-size:12px;color:var(--t2);}
    .footer-links a{color:var(--cyan);text-decoration:none;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/"><span>Atlas</span> Sports</a></div>
  <div class="card">
    <h1>Premium Login</h1>
    <p class="sub">Already a subscriber? Enter your credentials to restore access in this browser.</p>
    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn" id="submitBtn" type="submit">Sign In</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>
  <div class="footer-links">
    Don't have access? <a href="/checkout/">Get Premium</a> &nbsp;·&nbsp; <a href="/">Home</a>
  </div>
</div>

<script>
(function(){
  var form = document.getElementById('loginForm');
  var btn  = document.getElementById('submitBtn');
  var err  = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    if(!email || !password) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    err.style.display = 'none';

    fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: email, password: password})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok && data.token){
        localStorage.setItem('atlas_premium_token', data.token);
        window.location.href = '/dashboard/';
      } else {
        showError(data.error || 'Login failed. Check your credentials.');
      }
    })
    .catch(function(){
      showError('Network error. Please try again.');
    });
  });

  function showError(msg){
    err.textContent = msg;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
})();
</script>
</body>
</html>
