<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Atlas Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    h1 { font-size: 28px; font-weight: 700; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
    }
    .dot.stale { background: var(--yellow); }
    .dot.old { background: var(--red); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .product-name {
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .product-name.system { color: var(--blue); }
    .product-name.windfall { color: var(--purple); }
    .product-name.demonhunter { color: var(--red); }
    
    .hit-prob {
      font-size: 32px;
      font-weight: 700;
      color: var(--green);
    }
    .hit-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .meta {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .meta span { display: flex; align-items: center; gap: 4px; }
    
    .legs {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .leg {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      font-size: 14px;
    }
    .leg-player {
      font-weight: 500;
      flex: 1;
    }
    .leg-pick {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .dir.over { background: #166534; color: #bbf7d0; }
    .dir.under { background: #991b1b; color: #fecaca; }
    .stat-line {
      font-family: ui-monospace, monospace;
      font-size: 13px;
    }
    .tier {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tier.standard { background: #374151; color: #9ca3af; }
    .tier.goblin { background: #854d0e; color: #fef08a; }
    .tier.demon { background: #7f1d1d; color: #fca5a5; }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    
    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .refresh-btn:hover { background: var(--border); }
    
    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    
    footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Atlas Dashboard</h1>
        <div class="status">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Loading...</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <label class="auto-refresh">
          <input type="checkbox" id="autoRefresh" checked />
          Auto-refresh (30s)
        </label>
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
      </div>
    </header>
    
    <div class="grid" id="cards">
      <div class="no-data">Loading slips...</div>
    </div>
    
    <footer>
      <span id="runId"></span>
    </footer>
  </div>
  
  <script>
    let refreshTimer = null;
    
    async function loadData() {
      try {
        const resp = await fetch('/data/cloudflare_payload.json?t=' + Date.now());
        if (!resp.ok) throw new Error('Fetch failed');
        const data = await resp.json();
        render(data);
      } catch (e) {
        document.getElementById('cards').innerHTML = '<div class="no-data">Failed to load data</div>';
        document.getElementById('statusText').textContent = 'Error loading';
        document.getElementById('statusDot').className = 'dot old';
      }
    }
    
    function render(data) {
      const genAt = new Date(data.generated_at);
      const ageMin = Math.floor((Date.now() - genAt.getTime()) / 60000);
      
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      
      if (ageMin < 30) {
        dot.className = 'dot';
        statusText.textContent = 'Live ' + ageMin + 'm ago';
      } else if (ageMin < 120) {
        dot.className = 'dot stale';
        statusText.textContent = ageMin + 'm ago';
      } else {
        dot.className = 'dot old';
        statusText.textContent = 'Stale ' + Math.floor(ageMin / 60) + 'h ago';
      }
      
      document.getElementById('runId').textContent = 'Run: ' + data.run_id + ' | Generated: ' + genAt.toLocaleString();
      
      const cards = document.getElementById('cards');
      cards.innerHTML = '';
      
      // System - top 3-leg
      const sys = data.system && data.system.find(function(s) { return s.n_legs === 3; });
      if (sys) cards.appendChild(makeCard(sys, 'system'));
      
      // Windfall - top 3-leg
      const wind = data.windfall && data.windfall.find(function(s) { return s.n_legs === 3; });
      if (wind) cards.appendChild(makeCard(wind, 'windfall'));
      
      // Demonhunter - top 3-leg
      const demon = data.demonhunter && data.demonhunter.find(function(s) { return s.n_legs === 3; });
      if (demon) cards.appendChild(makeCard(demon, 'demonhunter'));
      
      if (!sys && !wind && !demon) {
        cards.innerHTML = '<div class="no-data">No slips available</div>';
      }
    }
    
    function makeCard(slip, type) {
      var card = document.createElement('div');
      card.className = 'card';
      
      var hitPct = (slip.hit_prob * 100).toFixed(1);
      var evMult = slip.ev_mult.toFixed(2);
      var payout = slip.payout_mult.toFixed(1);
      
      var legsHtml = '';
      var legs = slip.legs_detail || [];
      for (var i = 0; i < legs.length; i++) {
        var leg = legs[i];
        var dirClass = leg.dir.toLowerCase();
        var tierClass = leg.tier.toLowerCase();
        legsHtml += '<div class="leg">' +
          '<span class="leg-player">' + leg.player + '</span>' +
          '<div class="leg-pick">' +
            '<span class="dir ' + dirClass + '">' + leg.dir + '</span>' +
            '<span class="stat-line">' + leg.stat + ' ' + leg.line + '</span>' +
            '<span class="tier ' + tierClass + '">' + leg.tier + '</span>' +
          '</div>' +
        '</div>';
      }
      
      card.innerHTML = '<div class="card-header">' +
          '<div>' +
            '<div class="product-name ' + type + '">' + slip.product + '</div>' +
            '<div class="hit-label">' + slip.n_legs + '-Leg Slip</div>' +
          '</div>' +
          '<div style="text-align:right">' +
            '<div class="hit-prob">' + hitPct + '%</div>' +
            '<div class="hit-label">Hit Probability</div>' +
          '</div>' +
        '</div>' +
        '<div class="meta">' +
          '<span>EV: ' + evMult + 'x</span>' +
          '<span>Payout: ' + payout + 'x</span>' +
        '</div>' +
        '<div class="legs">' + legsHtml + '</div>';
      
      return card;
    }
    
    function setupAutoRefresh() {
      var cb = document.getElementById('autoRefresh');
      cb.addEventListener('change', function() {
        if (cb.checked) {
          refreshTimer = setInterval(loadData, 30000);
        } else {
          clearInterval(refreshTimer);
        }
      });
      refreshTimer = setInterval(loadData, 30000);
    }
    
    loadData();
    setupAutoRefresh();
  </script>
</body>
</html>
