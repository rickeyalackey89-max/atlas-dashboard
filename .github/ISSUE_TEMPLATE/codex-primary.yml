name: Codex Task - Primary Lane
description: Route a production-sensitive dashboard task to the primary Codex lane.
title: "[Codex Primary]: "
labels: ["codex", "codex:primary", "assigned:codex-primary", "needs-triage"]
assignees:
  - rickeyalackey89-max
body:
  - type: markdown
    attributes:
      value: |
        Target lane: `codex:primary`

        Use this for production-sensitive dashboard publishing, data contract, Cloudflare, or cross-repo work.
  - type: dropdown
    id: codex_lane
    attributes:
      label: Codex Lane
      description: This form defaults to the primary lane; labels are the routing source of truth.
      options:
        - Primary Codex
        - 5.3 Spark
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dashboard-ui
        - cloudflare
        - payload-contract
        - publishing
        - mobile
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: Describe the issue and include paths, URLs, screenshots, logs, or payload examples when available.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- Fix is implemented\n- Validation is run\n- UI/payload behavior is confirmed"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
  - type: input
    id: requested_assignee
    attributes:
      label: Requested GitHub Assignee
      description: Optional human GitHub username to assign or notify. Codex lane assignment is controlled by labels.
      placeholder: rickeyalackey89-max
  - type: checkboxes
    id: routing
    attributes:
      label: Routing Confirmation
      options:
        - label: This should be handled by the primary Codex lane, not the 5.3 Spark lane.
          required: true
        - label: The work is scoped to this repository unless explicitly stated.
          required: true
